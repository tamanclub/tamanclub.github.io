    .gcse-searchbox-only, .gcse-searchresults-only { width:100%; }
    /* Gõ lại style cho kết quả để khớp giao diện */
    .gsc-control-cse {
      font-family: inherit;
    }
    .gsc-webResult .gsc-result { background: #fff; border-radius:10px; padding:12px; margin-bottom:12px; box-shadow:0 1px 0 rgba(16,24,40,0.03) }
    .gsc-webResult .gs-title { font-size:18px; color:#0f172a }
    .gsc-webResult .gs-snippet { color: #6b7280; }
    /* Remove default Google borders that clash */
    .gsc-results .gsc-cursor-box { margin-top:12px; }
  </style>
</head>
<body>

        <!-- Search results -->

      <aside class="sidebar">
        <div class="widget">
          <h3>Bộ lọc</h3>
          <!-- <p style="color:var(--muted);font-size:14px">Google CSE tự xử lý kết quả; dùng tính năng Categories/labels trong CSE console để tạo bộ lọc.</p> -->

        <div class="widget widget-recent">
          <h3>Bài viết mới</h3>
          <ul>

        <nav class="footer-nav">

  <!-- Google CSE script: thay YOUR_CSE_ID bằng ID của bạn -->
  <script async src="https://cse.google.com/cse.js?cx=e1b7cbcbf8b494e31"></script>

  <script src="assets/js/main.js"></script>
  <script>
    // Auto-focus search input khi trang load nếu có param q -> fill vào box bằng cách dispatch search
    (function(){
      function getQueryParam(name){
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
      }
      var q = getQueryParam('q');
      if(q){
        // khi CSE đã load, set q và trigger
        window.addEventListener('load', function(){
          try {
            var input = document.querySelector('input.gsc-input');
            if(input){
              input.value = q;
              // submit CSE form if present
              var form = input.closest('form');
              if(form) form.submit();
            }
          } catch(e){}
        });
      }
    })();
  </script>
</body>
</html>
